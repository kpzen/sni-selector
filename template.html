<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNI-sök</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; color: #333; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: inherit;
            resize: vertical;
        }
        button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: #005A9C; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #999; }
        #status { color: #666; margin-bottom: 20px; font-style: italic; font-size: 14px; text-align: center; }
        
        details.result { background: #f4f4f5; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 4px solid #005A9C; }
        
        summary { cursor: pointer; list-style: none; position: relative; padding-right: 30px; }
        summary::-webkit-details-marker { display: none; }
        summary:hover .sni-title { text-decoration: underline; }
        
        summary::after {
            content: '+';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #005A9C;
            line-height: 1;
        }
        
        details[open] summary::after { content: '−'; }
        
        .score { font-weight: bold; color: #005A9C; margin-bottom: 5px; font-size: 14px; }
        .sni-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #333; }
        
        .sni-details { margin-top: 15px; font-size: 14px; line-height: 1.5; color: #444; border-top: 1px solid #ddd; padding-top: 10px;}
        .sni-details h4 { margin: 15px 0 5px 0; font-size: 14px; color: #222; }
        .sni-details ul { margin: 0 0 10px 0; padding-left: 20px; }
        .sni-details li { margin-bottom: 3px; }
        
        .scb-link { display: inline-block; margin-top: 10px; font-weight: bold; color: #005A9C; text-decoration: none; }
        .scb-link:hover { text-decoration: underline; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/minisearch@7.2.0/dist/umd/index.min.js"></script>
</head>
<body>

    <h2>SNI-sök</h2>
    <p>Beskriv din verksamhet med egna ord. Till exempel "Verksamheten består av en ambulerande food truck som serverar vedugnspizza, med en fullt utrustad hundtvättsstation integrerad på baksidan."</p>
    
    <textarea id="query" placeholder="Beskriv din verksamhet här..." rows="2" disabled></textarea>
    <button id="searchBtn" disabled>Sök</button>
    <div id="status">Laddar databas och AI-modeller...</div>
    
    <div id="viewToggle" style="display: none; margin-bottom: 20px; text-align: center; font-size: 15px; background: #eef5fa; padding: 10px; border-radius: 6px;">
        <span style="font-weight: bold; margin-right: 15px;">Sortera resultaten efter:</span>
        <label style="margin-right: 15px; cursor: pointer;">
            <input type="radio" name="resultView" value="rerank" checked>
            Cross-Encoder Rerank (Smartast)
        </label>
        <label style="cursor: pointer;">
            <input type="radio" name="resultView" value="rrf">
            RRF (Nyckelord + Vektor)
        </label>
    </div>

    <div id="results"></div>

    <script type="module">
        import { pipeline, AutoTokenizer, AutoModelForSequenceClassification, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.1.0';
        env.allowLocalModels = false;

        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const searchBtn = document.getElementById('searchBtn');
        const queryInput = document.getElementById('query');
        const database = /*INJECT_DATABASE_HERE*/; 

        let currentResults = []; // Stores the search results in memory

        const msData = database.map(item => ({
            sni: item.sni,
            title: item.title,
            covers_text: (item.covers || []).join(" "),
            also_covers_text: (item.also_covers || []).join(" "),
            examples_text: (item.examples || []).join(" ")
        }));
        const miniSearch = new MiniSearch({
            fields: ['sni', 'title', 'covers_text', 'also_covers_text', 'examples_text'],
            idField: 'sni',
            tokenize: (string) => string.toLowerCase().match(/[\p{L}\p{N}]+/gu) || [],
            processTerm: (term) => term.toLowerCase()
        });
        miniSearch.addAll(msData);

        const searchableChunks = [];
        if (Array.isArray(database)) {
            database.forEach(sniObj => {
                if (sniObj.chunks) {
                    sniObj.chunks.forEach(chunk => {
                        searchableChunks.push({
                            sni: sniObj.sni,
                            title: sniObj.title,
                            url: sniObj.url,
                            matchedText: chunk.text,
                            vector: chunk.vector
                        });
                    });
                }
            });
        }

        let extractor;
        let rerankTokenizer;
        let rerankModel;
        let activeInitStep = 0;

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] ** 2;
                normB += vecB[i] ** 2;
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        async function init() {
            try {
                if (window.location.protocol === 'file:') {
                    throw new Error("Säkerhetsblockering! Kör via en webbserver eller GitHub Pages.");
                }

                activeInitStep = 1;
                statusEl.innerText = "Steg 1/3: Förbereder nedladdning av vektor-modell...";
                extractor = await pipeline('feature-extraction', 'Kristian-E/sentence-bert-swedish-onnx', {
                    progress_callback: (data) => {
                        if (activeInitStep !== 1) return; 
                        if (data.status === 'progress' && data.total) {
                            const loadedMB = (data.loaded / (1024 * 1024)).toFixed(1);
                            const totalMB = (data.total / (1024 * 1024)).toFixed(1);
                            statusEl.innerText = `Steg 1/3: Laddar ner vektor-modell (${loadedMB} / ${totalMB} MB)...`;
                        }
                    }
                });

                activeInitStep = 2;
                statusEl.innerText = "Steg 2/3: Laddar och patchar Rerank-konfiguration...";
                
                const model_id = 'jinaai/jina-reranker-v2-base-multilingual';
                
                const configRes = await fetch(`https://huggingface.co/${model_id}/resolve/main/config.json`);
                const configJson = await configRes.json();
                configJson.model_type = 'xlm-roberta'; 
                // Instruct the model to output raw logits
                configJson.problem_type = 'regression'; 

                const rerankConfig = {
                    device: 'webgpu',
                    dtype: 'q8',
                    config: configJson, 
                    progress_callback: (data) => {
                        if (activeInitStep !== 2) return; 
                        if (data.status === 'progress' && data.total) {
                            const loadedMB = (data.loaded / (1024 * 1024)).toFixed(1);
                            const totalMB = (data.total / (1024 * 1024)).toFixed(1);
                            statusEl.innerText = `Steg 2/3: Laddar ner Rerank-modell (${loadedMB} / ${totalMB} MB)...`;
                        }
                    }
                };

                try {
                    rerankTokenizer = await AutoTokenizer.from_pretrained(model_id);
                    rerankModel = await AutoModelForSequenceClassification.from_pretrained(model_id, rerankConfig);
                } catch (error) {
                    console.warn("WebGPU misslyckades. Försöker fallback till WASM (CPU)...", error);
                    statusEl.innerText = "WebGPU ej tillgängligt. Laddar Rerank-modell via standardprocessor (WASM)...";
                    
                    rerankConfig.device = 'wasm';
                    try {
                        rerankTokenizer = await AutoTokenizer.from_pretrained(model_id);
                        rerankModel = await AutoModelForSequenceClassification.from_pretrained(model_id, rerankConfig);
                    } catch (fallbackError) {
                        console.error("WASM fallback misslyckades.", fallbackError);
                    }
                }

                activeInitStep = 3;
                statusEl.innerText = "Steg 3/3: Optimerar AI för din enhet (Kan ta upp till en minut)...";
                await extractor("warmup", { pooling: 'mean', normalize: true });
                
                activeInitStep = 4;
                statusEl.innerText = "Klar! Skriv in en sökning.";
                searchBtn.disabled = false;
                queryInput.disabled = false;
            } catch (error) {
                console.error("Init Error:", error);
                statusEl.innerText = "Ett fel uppstod: " + error.message;
                statusEl.style.color = "red";
            }
        }

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!searchBtn.disabled) searchBtn.click();
            }
        });

        searchBtn.addEventListener('click', async () => {
            const rawQueryText = queryInput.value;
            if (!rawQueryText) return;

            statusEl.innerText = "Söker genom bas-index...";
            resultsEl.innerHTML = "";
            document.getElementById('viewToggle').style.display = 'none';
            searchBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                const VECTOR_WEIGHT = 0.6;  
                const KEYWORD_WEIGHT = 0.4; 
                const RRF_K = 60;           

                const keywordResults = miniSearch.search(rawQueryText, { prefix: true, fuzzy: 0.2 });
                const keywordRanks = {};
                keywordResults.forEach((res, index) => { keywordRanks[res.id] = index + 1; });

                const queryPieces = rawQueryText.split(/\./g).map(p => p.trim()).filter(p => p.length > 0);
                const queryVectors = [];
                for (const piece of queryPieces) {
                    const output = await extractor(piece, { pooling: 'mean', normalize: true });
                    queryVectors.push({ text: piece, vector: Array.from(output.data) });
                }

                const vectorScores = {};
                for (const chunk of searchableChunks) {
                    let highestScore = -1;
                    for (const qObj of queryVectors) {
                        const currentScore = cosineSimilarity(qObj.vector, chunk.vector);
                        if (currentScore > highestScore) highestScore = currentScore;
                    }
                    if (!vectorScores[chunk.sni] || highestScore > vectorScores[chunk.sni]) {
                        vectorScores[chunk.sni] = highestScore;
                    }
                }

                const sortedVectorSNIs = Object.keys(vectorScores).sort((a, b) => vectorScores[b] - vectorScores[a]);
                const vectorRanks = {};
                sortedVectorSNIs.forEach((sni, index) => { vectorRanks[sni] = index + 1; });

                const allUniqueSNIs = new Set([...Object.keys(keywordRanks), ...Object.keys(vectorRanks)]);
                let combinedResults = [];

                for (const sni of allUniqueSNIs) {
                    const kRank = keywordRanks[sni] || 1000;
                    const vRank = vectorRanks[sni] || 1000;
                    const rrfScore = (KEYWORD_WEIGHT * (1 / (RRF_K + kRank))) + (VECTOR_WEIGHT * (1 / (RRF_K + vRank)));
                    combinedResults.push({ sni: sni, score: rrfScore });
                }

                combinedResults.sort((a, b) => b.score - a.score);
                let topResults = combinedResults.slice(0, 20);

                if (rerankModel && topResults.length > 0) {
                    const safeQuery = rawQueryText.substring(0, 500);

                    // Loop through the results sequentially instead of doing a single batch
                    for (let i = 0; i < topResults.length; i++) {
                        // 1. Update the UI text
                        statusEl.innerText = `Analyserar ${i + 1} av ${topResults.length} resultat med Cross-Encoder...`;
                        
                        // 2. CRITICAL: Yield control back to the browser for a few milliseconds 
                        // so it has time to visually update the text on the screen before the AI freezes the thread again.
                        await new Promise(resolve => setTimeout(resolve, 20));

                        const candidate = topResults[i];
                        const fullData = database.find(item => item.sni === candidate.sni);
                        const documentText = `${fullData.sni}: ${fullData.title}. ${(fullData.covers || []).join(' ')}`;
                        const safeDocumentText = documentText.substring(0, 1000);

                        try {
                            // 3. Tokenize just this single pair
                            const inputs = rerankTokenizer(safeQuery, {
                                text_pair: safeDocumentText,
                                padding: true,
                                truncation: true
                            });

                            // 4. Run the model for this single item
                            const { logits } = await rerankModel(inputs);
                            
                            // Extract the raw float score and attach it to our candidate
                            candidate.rerank_score = logits.data[0];

                        } catch (error) {
                            console.error(`Reranking misslyckades för index ${i}.`, error);
                            candidate.rerank_score = -999; // Fallback so it drops to the bottom if it crashes
                        }
                    }

                    // Sort the results based on the new semantic scores now that the loop is done
                    topResults.sort((a, b) => b.rerank_score - a.rerank_score);
                }

                // Assign the final parsed results to our global variable
                currentResults = topResults;

                statusEl.innerText = `Visar de ${topResults.length} mest relevanta SNI-koderna baserat på beskrivningen.`;
                searchBtn.disabled = false;
                
                // Show the radio buttons now that we have data
                document.getElementById('viewToggle').style.display = 'block';

                // Call our new render function to display the list
                renderResults();

            } catch (error) {
                console.error("Search Error:", error);
                statusEl.innerText = "Sökningen misslyckades: " + error.message;
                statusEl.style.color = "red";
                searchBtn.disabled = false;
            }
        });

        function renderResults() {
            const viewMode = document.querySelector('input[name="resultView"]:checked').value;
            
            // Create a shallow copy of the results so we don't break the original array
            let sortedResults = [...currentResults];

            // Sort the array based on the selected mode
            if (viewMode === 'rerank') {
                sortedResults.sort((a, b) => (b.rerank_score || -999) - (a.rerank_score || -999));
            } else {
                sortedResults.sort((a, b) => b.score - a.score);
            }

            resultsEl.innerHTML = "";

            const KEYWORD_WEIGHT = 0.4; 
            const VECTOR_WEIGHT = 0.6; 
            const RRF_K = 60;
            const maxPossibleScore = (KEYWORD_WEIGHT * (1 / (RRF_K + 1))) + (VECTOR_WEIGHT * (1 / (RRF_K + 1)));

            sortedResults.forEach((res, rankIdx) => {
                const fullData = database.find(item => item.sni === res.sni);
                if (!fullData) return;

                let detailsHtml = "";
                if (fullData.covers && fullData.covers.length > 0) {
                    detailsHtml += `<h4>Omfattar:</h4><ul>${fullData.covers.map(c => `<li>${c}</li>`).join('')}</ul>`;
                }
                if (fullData.also_covers && fullData.also_covers.length > 0) {
                    detailsHtml += `<h4>Omfattar även:</h4><ul>${fullData.also_covers.map(c => `<li>${c}</li>`).join('')}</ul>`;
                }
                if (fullData.does_not_cover && fullData.does_not_cover.length > 0) {
                    detailsHtml += `<h4>Omfattar inte:</h4><ul>${fullData.does_not_cover.map(c => `<li>${c}</li>`).join('')}</ul>`;
                }
                if (fullData.examples && fullData.examples.length > 0) {
                    detailsHtml += `<h4>Exempel på vad som ingår:</h4><ul>${fullData.examples.map(c => `<li>${c}</li>`).join('')}</ul>`;
                }

                let scoreHtml = "";
                const displayRrfScore = ((res.score / maxPossibleScore) * 100).toFixed(1);
                
                if (viewMode === 'rerank' && res.rerank_score !== undefined) {
                    scoreHtml = `Semantisk Relevans (Cross-Encoder): ${res.rerank_score.toFixed(3)} <span style="color:#666; font-weight:normal; margin-left: 8px;">(RRF: ${displayRrfScore}%)</span>`;
                } else {
                    scoreHtml = `Träffsäkerhet (RRF): ${displayRrfScore}%`;
                    if (res.rerank_score !== undefined) {
                        scoreHtml += `<span style="color:#666; font-weight:normal; margin-left: 8px;">(Reranker: ${res.rerank_score.toFixed(2)})</span>`;
                    }
                }

                resultsEl.innerHTML += `
                    <details class="result">
                        <summary>
                            <div class="score">#${rankIdx + 1} | ${scoreHtml} </div>
                            <div class="sni-title">${fullData.sni} - ${fullData.title}</div>
                        </summary>
                        <div class="sni-details">
                            ${detailsHtml}
                            <a class="scb-link" href="${fullData.url}" target="_blank">Läs mer på SCB:s webbplats ↗</a>
                        </div>
                    </details>
                `;
            });
        }

        // Listen for changes from the radio buttons
        document.querySelectorAll('input[name="resultView"]').forEach(radio => {
            radio.addEventListener('change', () => {
                if (currentResults.length > 0) {
                    renderResults();
                }
            });
        });

        init();
    </script>
</body>
</html>
