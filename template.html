<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNI AI-Sök Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: #005A9C; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #999; }
        #status { color: #666; margin-bottom: 20px; font-style: italic; font-size: 14px; text-align: center; }
        .result { background: #f4f4f5; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 4px solid #005A9C; }
        .score { font-weight: bold; color: #005A9C; margin-bottom: 5px; font-size: 14px;}
        .sni-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .sni-title a { color: #333; text-decoration: none; }
        .sni-title a:hover { text-decoration: underline; }
        .match-reason { font-size: 14px; color: #555; background: #e0e0e0; padding: 10px; border-radius: 4px; margin-top: 10px; line-height: 1.4; }
        .query-part { color: #005A9C; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🤖 SCB SNI AI-Sök (Multi-Sök)</h2>
    <p>Beskriv din verksamhet. Skriv gärna flera olika delar (t.ex. "Vi bygger bilar, säljer kaffe och odlar potatis").</p>
    
    <input type="text" id="query" placeholder="Beskriv din verksamhet här..." disabled>
    <button id="searchBtn" disabled>Sök</button>
    <div id="status">Laddar databas och AI-modell...</div>
    <div id="results"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        env.allowLocalModels = false;

        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const searchBtn = document.getElementById('searchBtn');
        const queryInput = document.getElementById('query');
        const database = /*INJECT_DATABASE_HERE*/; 

        // Flatten the nested JSON into a single searchable array of chunks
        const searchableChunks = [];
        if (Array.isArray(database)) {
            database.forEach(sniObj => {
                if (sniObj.chunks) {
                    sniObj.chunks.forEach(chunk => {
                        searchableChunks.push({
                            sni: sniObj.sni,
                            title: sniObj.title,
                            url: sniObj.url,
                            matchedText: chunk.text,
                            vector: chunk.vector
                        });
                    });
                }
            });
        }

        let extractor;
        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] ** 2;
                normB += vecB[i] ** 2;
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        async function init() {
            try {
                if (window.location.protocol === 'file:') {
                    throw new Error("Säkerhetsblockering! Du kan inte köra denna fil via 'file://' i Chrome. Kör via en webbserver eller GitHub Pages.");
                }

                statusEl.innerText = "Steg 1/2: Laddar ner AI-modell (ca 125 MB)...";
                // Load the specialized Swedish Sentence-BERT ONNX model
                extractor = await pipeline('feature-extraction', 'Kristian-E/sentence-bert-swedish-onnx');
                statusEl.innerText = "Steg 2/2: Optimerar AI för din enhet (Kan ta upp till en minut)...";
                await extractor("warmup", { pooling: 'mean', normalize: true });
                
                statusEl.innerText = "Klar! Skriv in en sökning.";
                searchBtn.disabled = false;
                queryInput.disabled = false;
            } catch (error) {
                console.error("Init Error:", error);
                statusEl.innerText = "Ett fel uppstod: " + error.message;
                statusEl.style.color = "red";
            }
        }

        searchBtn.addEventListener('click', async () => {
            const rawQueryText = queryInput.value;
            if (!rawQueryText) return;

            statusEl.innerText = "Söker...";
            resultsEl.innerHTML = "";
            searchBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                // 1. Split the query by period, comma, or the words "och" / "samt" (with word boundaries)
                // We use trim and filter to remove any empty strings resulting from the split
                const queryPieces = rawQueryText
                    .split(/[\.,]|\boch\b|\bsamt\b/gi)
                    .map(piece => piece.trim())
                    .filter(piece => piece.length > 0);

                // 2. Vectorize every valid piece of the input
                const queryVectors = [];
                for (const piece of queryPieces) {
                    const output = await extractor(piece, { pooling: 'mean', normalize: true });
                    queryVectors.push({
                        text: piece,
                        vector: Array.from(output.data)
                    });
                }

                // 3. Compare all searchable chunks against ALL query vectors
                let scoredChunks = searchableChunks.map(chunk => {
                    let highestScore = -1;
                    let bestMatchedQueryPiece = "";

                    for (const qObj of queryVectors) {
                        const currentScore = cosineSimilarity(qObj.vector, chunk.vector);
                        if (currentScore > highestScore) {
                            highestScore = currentScore;
                            bestMatchedQueryPiece = qObj.text;
                        }
                    }

                    return { 
                        ...chunk, 
                        score: highestScore, 
                        matchedQuery: bestMatchedQueryPiece 
                    };
                });
                // Sort by highest similarity overall
                scoredChunks.sort((a, b) => b.score - a.score);
                // 4. Deduplicate to show top 10 unique SNI codes
                let uniqueResults = [];
                let seenSni = new Set();
                
                for (let chunk of scoredChunks) {
                    if (!seenSni.has(chunk.sni)) {
                        uniqueResults.push(chunk);
                        seenSni.add(chunk.sni);
                        if (uniqueResults.length === 10) break; // Now captures top 10
                    }
                }

                statusEl.innerText = `Hittade ${uniqueResults.length} träffar baserat på ${queryPieces.length} sökdelar.`;
                searchBtn.disabled = false;

                // 5. Render results, showing exactly which piece matched
                uniqueResults.forEach(res => {
                    resultsEl.innerHTML += `
                        <div class="result">
                            <div class="score">Träffsäkerhet: ${(res.score * 100).toFixed(1)}%</div>
                            <div class="sni-title"><a href="${res.url}" target="_blank">${res.sni} - ${res.title}</a></div>
                            <div class="match-reason">
                                Din sökdel "<span class="query-part">${res.matchedQuery}</span>" matchade:<br>
                                <strong>"${res.matchedText}"</strong>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Search Error:", error);
                statusEl.innerText = "Sökningen misslyckades: " + error.message;
                statusEl.style.color = "red";
                searchBtn.disabled = false;
            }
        });

        init();
    </script>
</body>
</html>
