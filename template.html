<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNI-sök</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: #005A9C; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #999; }
        #status { color: #666; margin-bottom: 20px; font-style: italic; font-size: 14px; text-align: center; }
        
        /* New styling for expandable results */
        details.result { background: #f4f4f5; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 4px solid #005A9C; }
        
        /* Added padding to prevent text from overlapping the plus/minus icon */
        summary { cursor: pointer; list-style: none; position: relative; padding-right: 30px; }
        summary::-webkit-details-marker { display: none; }
        summary:hover .sni-title { text-decoration: underline; }
        
        /* The Plus icon for collapsed state */
        summary::after {
            content: '+';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #005A9C;
            line-height: 1;
        }
        
        /* The Minus icon for expanded state */
        details[open] summary::after {
            content: '−'; /* Using a minus sign instead of hyphen for better vertical alignment */
        }
        
        .score { font-weight: bold; color: #005A9C; margin-bottom: 5px; font-size: 14px; }
        .sni-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #333; }
        
        .sni-details { margin-top: 15px; font-size: 14px; line-height: 1.5; color: #444; border-top: 1px solid #ddd; padding-top: 10px;}
        .sni-details h4 { margin: 15px 0 5px 0; font-size: 14px; color: #222; }
        .sni-details ul { margin: 0 0 10px 0; padding-left: 20px; }
        .sni-details li { margin-bottom: 3px; }
        
        .scb-link { display: inline-block; margin-top: 10px; font-weight: bold; color: #005A9C; text-decoration: none; }
        .scb-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h2>SNI-sök</h2>
    <p>Beskriv din verksamhet med egna ord. Skriv gärna flera olika delar (t.ex. "Vi bygger bilar, säljer kaffe och odlar potatis").</p>
    
    <input type="text" id="query" placeholder="Beskriv din verksamhet här..." disabled>
    <button id="searchBtn" disabled>Sök</button>
    <div id="status">Laddar databas och AI-modell...</div>
    <div id="results"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        env.allowLocalModels = false;

        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const searchBtn = document.getElementById('searchBtn');
        const queryInput = document.getElementById('query');
        const database = /*INJECT_DATABASE_HERE*/; 

        // Flatten the nested JSON into a single searchable array of chunks
        const searchableChunks = [];
        if (Array.isArray(database)) {
            database.forEach(sniObj => {
                if (sniObj.chunks) {
                    sniObj.chunks.forEach(chunk => {
                        searchableChunks.push({
                            sni: sniObj.sni,
                            title: sniObj.title,
                            url: sniObj.url,
                            matchedText: chunk.text,
                            vector: chunk.vector
                        });
                    });
                }
            });
        }

        let extractor;
        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] ** 2;
                normB += vecB[i] ** 2;
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        async function init() {
            try {
                if (window.location.protocol === 'file:') {
                    throw new Error("Säkerhetsblockering! Du kan inte köra denna fil via 'file://' i Chrome. Kör via en webbserver eller GitHub Pages.");
                }

                statusEl.innerText = "Steg 1/2: Förbereder nedladdning av AI-modell...";
                
                // Load the specialized Swedish Sentence-BERT ONNX model with a progress callback
                extractor = await pipeline('feature-extraction', 'Kristian-E/sentence-bert-swedish-onnx', {
                    progress_callback: (data) => {
                        if (data.status === 'downloading' && data.total) {
                            const loadedMB = (data.loaded / (1024 * 1024)).toFixed(1);
                            const totalMB = (data.total / (1024 * 1024)).toFixed(1);
                            statusEl.innerText = `Steg 1/2: Laddar ner AI-modell (${loadedMB} / ${totalMB} MB)...`;
                        }
                    }
                });
                
                statusEl.innerText = "Steg 2/2: Optimerar AI för din enhet (Kan ta upp till en minut)...";
                await extractor("warmup", { pooling: 'mean', normalize: true });
                
                statusEl.innerText = "Klar! Skriv in en sökning.";
                searchBtn.disabled = false;
                queryInput.disabled = false;
            } catch (error) {
                console.error("Init Error:", error);
                statusEl.innerText = "Ett fel uppstod: " + error.message;
                statusEl.style.color = "red";
            }
        }

        searchBtn.addEventListener('click', async () => {
            const rawQueryText = queryInput.value;
            if (!rawQueryText) return;

            statusEl.innerText = "Söker...";
            resultsEl.innerHTML = "";
            searchBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                // 1. Split the query ONLY by period
                const queryPieces = rawQueryText
                    .split(/\./g)
                    .map(piece => piece.trim())
                    .filter(piece => piece.length > 0);

                // 2. Vectorize every valid piece of the input
                const queryVectors = [];
                for (const piece of queryPieces) {
                    const output = await extractor(piece, { pooling: 'mean', normalize: true });
                    queryVectors.push({
                        text: piece,
                        vector: Array.from(output.data)
                    });
                }

                // 3. Compare all searchable chunks against ALL query vectors
                let scoredChunks = searchableChunks.map(chunk => {
                    let highestScore = -1;

                    for (const qObj of queryVectors) {
                        const currentScore = cosineSimilarity(qObj.vector, chunk.vector);
                        if (currentScore > highestScore) {
                            highestScore = currentScore;
                        }
                    }

                    return { 
                        ...chunk, 
                        score: highestScore
                    };
                });

                // Sort by highest similarity overall
                scoredChunks.sort((a, b) => b.score - a.score);

                // 4. Deduplicate to show top 20 unique SNI codes
                let uniqueResults = [];
                let seenSni = new Set();
                
                for (let chunk of scoredChunks) {
                    if (!seenSni.has(chunk.sni)) {
                        uniqueResults.push(chunk);
                        seenSni.add(chunk.sni);
                        if (uniqueResults.length === 20) break; 
                    }
                }

                statusEl.innerText = `Visar de ${uniqueResults.length} mest relevanta SNI-koderna baserat på beskrivningen.`;
                searchBtn.disabled = false;

                // 5. Render expandable results, fetching full details from the original database array
                uniqueResults.forEach(res => {
                    const fullData = database.find(item => item.sni === res.sni);
                    let detailsHtml = "";

                    if (fullData) {
                        if (fullData.covers && fullData.covers.length > 0) {
                            detailsHtml += `<h4>Omfattar:</h4><ul>${fullData.covers.map(c => `<li>${c}</li>`).join('')}</ul>`;
                        }
                        if (fullData.also_covers && fullData.also_covers.length > 0) {
                            detailsHtml += `<h4>Omfattar även:</h4><ul>${fullData.also_covers.map(c => `<li>${c}</li>`).join('')}</ul>`;
                        }
                        if (fullData.does_not_cover && fullData.does_not_cover.length > 0) {
                            detailsHtml += `<h4>Omfattar inte:</h4><ul>${fullData.does_not_cover.map(c => `<li>${c}</li>`).join('')}</ul>`;
                        }
                        if (fullData.examples && fullData.examples.length > 0) {
                            detailsHtml += `<h4>Exempel på vad som ingår:</h4><ul>${fullData.examples.map(c => `<li>${c}</li>`).join('')}</ul>`;
                        }
                    }

                    resultsEl.innerHTML += `
                        <details class="result">
                            <summary>
                                <div class="score">Träffsäkerhet: ${(res.score * 100).toFixed(1)}%</div>
                                <div class="sni-title">${res.sni} - ${res.title}</div>
                            </summary>
                            <div class="sni-details">
                                ${detailsHtml}
                                <a class="scb-link" href="${res.url}" target="_blank">Läs mer på SCB:s webbplats ↗</a>
                            </div>
                        </details>
                    `;
                });

            } catch (error) {
                console.error("Search Error:", error);
                statusEl.innerText = "Sökningen misslyckades: " + error.message;
                statusEl.style.color = "red";
                searchBtn.disabled = false;
            }
        });

        init();
    </script>
</body>
</html>
