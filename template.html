<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNI-sök (KBLab AI)</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
            color: #333;
        }
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 0.75rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        #status {
            font-style: italic;
            color: #666;
            margin-bottom: 2rem;
        }
        .result {
            border: 1px solid #e0e0e0;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            background-color: #fafafa;
        }
        .score {
            font-weight: 600;
            color: #2e7d32;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sni-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .sni-title a {
            color: #0056b3;
            text-decoration: none;
        }
        .sni-title a:hover {
            text-decoration: underline;
        }
        .match-reason {
            font-size: 0.95rem;
            color: #555;
            background-color: #fff;
            padding: 0.75rem;
            border-left: 4px solid #0056b3;
            margin-top: 0.75rem;
        }
        .query-part {
            font-weight: bold;
            color: #111;
        }
    </style>
</head>
<body>
    <h1>AI-driven SNI-sök</h1>
    <p>Beskriv din verksamhetsidé (du kan ange flera delar separerade med kommatecken).</p>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="T.ex. Jag vill tillverka glass, sälja mjukglass">
        <button id="searchBtn" disabled>Laddar AI-modell...</button>
    </div>
    
    <div id="status">Laddar KBLab-modell via WebGPU och hämtar databas, vänligen vänta...</div>
    <div id="results"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.0';


        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');

        let extractor;
        let database = [];

        // Utility: Calculate Cosine Similarity via Dot Product (Valid since vectors are L2 normalized)
        function dotProduct(vecA, vecB) {
            return vecA.reduce((sum, val, i) => sum + val * vecB[i], 0);
        }

        async function init() {
            try {
                // 2. Load the pre-embedded database from the bundler
                const rawData = `/*INJECT_DATABASE_HERE*/`;
                
                if (rawData.trim() === '/*INJECT_DATABASE_HERE*/') {
                    throw new Error("Databasen är inte inläst. Vänligen kör bundler.py först.");
                }
                
                database = JSON.parse(rawData);

                // 3. Initialize the WebGPU pipeline with the KBLab model
                extractor = await pipeline(
                    'feature-extraction', 
                    'Kristian-E/sentence-bert-swedish-onnx', 
                    { device: 'webgpu' }
                );

                statusEl.innerText = "Klar! Skriv in din verksamhetsidé och klicka på sök.";
                searchBtn.disabled = false;
            } catch (error) {
                console.error("Initialization Error:", error);
                statusEl.innerText = "Ett fel uppstod: " + error.message;
                statusEl.style.color = "red";
            }
        }

        searchBtn.addEventListener('click', async () => {
            const query = searchInput.value.trim();
            if (!query) return;

            searchBtn.disabled = true;
            statusEl.innerText = "Beräknar semantiska inbäddningar...";
            statusEl.style.color = "#555";
            resultsEl.innerHTML = "";

            try {
                // Split query by commas to handle multi-part inputs natively
                const queryPieces = query.split(',').map(s => s.trim()).filter(s => s.length > 0);
                let allMatches = [];

                // Process each piece of the query against the vector database
                for (const piece of queryPieces) {
                    // Extract embedding with mean pooling and L2 normalization
                    const output = await extractor(piece, { pooling: 'mean', normalize: true });
                    const queryVector = Array.from(output.data);

                    for (const item of database) {
                        if (!item.chunks) continue;
                        
                        for (const chunk of item.chunks) {
                            const score = dotProduct(queryVector, chunk.vector);
                            
                            allMatches.push({
                                sni: item.sni,
                                title: item.title || "Titel saknas",
                                url: item.url || "#",
                                matchedText: chunk.text,
                                matchedQuery: piece,
                                score: score
                            });
                        }
                    }
                }

                // Sort all matches by highest similarity score
                allMatches.sort((a, b) => b.score - a.score);

                // Deduplicate to get the top 10 unique SNI codes
                let uniqueResults = [];
                let seenSni = new Set();

                for (const match of allMatches) {
                    if (!seenSni.has(match.sni)) {
                        uniqueResults.push(match);
                        seenSni.add(match.sni);
                        if (uniqueResults.length === 10) break; // Now captures top 10
                    }
                }

                statusEl.innerText = `Hittade ${uniqueResults.length} träffar baserat på ${queryPieces.length} sökdelar.`;
                searchBtn.disabled = false;

                // 4. Render results to the DOM
                uniqueResults.forEach(res => {
                    resultsEl.innerHTML += `
                        <div class="result">
                            <div class="score">Träffsäkerhet: ${(res.score * 100).toFixed(1)}%</div>
                            <div class="sni-title"><a href="${res.url}" target="_blank">${res.sni} - ${res.title}</a></div>
                            <div class="match-reason">
                                Din sökdel "<span class="query-part">${res.matchedQuery}</span>" matchade:<br>
                                <strong>"${res.matchedText}"</strong>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Search Error:", error);
                statusEl.innerText = "Sökningen misslyckades: " + error.message;
                statusEl.style.color = "red";
                searchBtn.disabled = false;
            }
        });

        // Trigger search on Enter key
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !searchBtn.disabled) {
                searchBtn.click();
            }
        });

        // Boot up the application
        init();
    </script>
</body>
</html>
